<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hearly</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* CSS Reset */
        body {
            color: aliceblue;
            margin: 0;
            padding: 0;
            background: url('img/bg.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: Arial, sans-serif;
        }

        input{
             text-align: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px; /* Reduced padding to move items up */
            position: relative; /* Ensure the header stays at the top */
        }

        .left {
            display: flex;
            align-items: center;
        }

        .left img {
            width: 100px;
            filter: invert(100%);
        }

        .left div {
            font-size: 2rem;
            margin-left: 10px;
        }

        .mid {
            flex-grow: 1;
            text-align: center;
            position: relative;
            top: -10px; /* Move the navigation items up */
            color: #ffffff;
        }

        .navbar {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .navbar li {
            display: inline-block;
            margin: 0 15px;
        }

        .navbar li a {
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
        }

        .navbar li a:hover, .navbar li a.active {
            text-decoration: underline;
            color: grey;
        }

        .right {
            display: flex;
            gap: 10px;
        }

        .btn {
            background-color: rgb(144, 144, 144);
            color: white;
            padding: 10px 20px;
            border: 2px solid black;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
        }

        .btn:hover {
            background-color: rgb(88, 86, 86);
        }

        .container {
            background-color: rgba(0, 0, 0, 0.7);
            margin: 50px auto;
            padding: 20px;
            width: 50%;
            border-radius: 20px;
            text-align: center;
        }

        .container h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .form-group input {
            width: 80%;
            padding: 10px;
            margin: 10px auto;
            border: 2px solid black;
            border-radius: 8px;
            font-size: 1rem;
            display: block;
        }

        .container button {
            margin: 10px auto;
            display: block;
            width: 50%;
        }
    </style>
</head>
<body>
    <header class="header">
        <!-- Left for logo -->
        <div class="left">
            <img src="img/logo-removebg-preview.png" alt="">
            <div>Hearly</div>
        </div>
        <!-- Mid for nav -->
        <div class="mid">
            <ul class="navbar">
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#">Genre</a></li>
                <li><a href="#">Contact Us</a></li>
            </ul>
        </div>
        <!-- Right for buttons -->
        <div class="right">
            <button class="btn">Call Us</button>
            <button class="btn">Email</button>
        </div>
    </header>
    <div class="container">
        <h1>Get Started with the Melodious Hearly</h1>
        <form action="noaction.php">
            <div class="form-group">
                <input  type="text" name="name" placeholder="Enter your Name">
            </div>
            <div class="form-group">
                <input type="text" name="contact" placeholder="Enter your Contact no.">
            </div>
            <div class="form-group">
                <input type="text" name="email" placeholder="Enter your Email">
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password">
            </div>
            <button class="btn">Login</button>
            <button class="btn">Sign In</button>
            <button class="btn">Forget Password</button>
        </form>
    </div>
</body>
</html>
